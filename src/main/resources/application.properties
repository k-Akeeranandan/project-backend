 spring.application.name=backend-project
# Load machine-local secrets if present (survives restarts, not committed)
spring.config.import=optional:file:./local-secrets.properties

#configure the server port
server.port=${PORT:8080}

# JWT (HS256 requires at least 32 bytes — use a strong secret in production)
jwt.secret=${JWT_SECRET:ChangeMeToAVeryLongSecretKeyAtLeast32BytesLong!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configure DB properties
# On Render, set these env vars from Railway's public MySQL connection details:
# MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Note: mysql.railway.internal only works inside Railway, not from Render.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:sec-51}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:Akeera@567}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#configure jpa properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

# Frontend URLs allowed to call this backend
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/resumes

# Email notifications when admin approves or rejects a user
# Gmail recommended: use an App Password (NOT your normal Gmail password)
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.application-name=${APP_MAIL_APPLICATION_NAME:Virtual Career Fair}

# If app.mail.from is unset, spring.mail.username is used as From when set.
# Values can come from:
# 1) local-secrets.properties (recommended for local dev), or
# 2) OS env vars (MAIL_USERNAME / MAIL_PASSWORD)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional: if you want a different From
# app.mail.from=${MAIL_FROM:}

# Bootstrap helper (one-time): promote a user to ADMIN on startup
# Example (PowerShell):     
#   $env:BOOTSTRAP_PROMOTE_ADMIN_EMAIL="rajakeera@gmail.com"
#   $env:BOOTSTRAP_SET_PASSWORD="NewPasswordHere"
#   mvn spring-boot:run
app.bootstrap.promote-admin-email=${BOOTSTRAP_PROMOTE_ADMIN_EMAIL:}
app.bootstrap.set-password=${BOOTSTRAP_SET_PASSWORD:}

# OAuth2 social login (Google / GitHub)
# After configuring, frontend buttons will work:
# - http://localhost:2026/auth/google
# - http://localhost:2026/auth/github
#
# Redirect after successful login (frontend will store the JWT and redirect)
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}
