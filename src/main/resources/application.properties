 spring.application.name=backend-project

#configure the server port
server.port = 2026

# JWT (HS256 requires at least 32 bytes — use a strong secret in production)
jwt.secret=ChangeMeToAVeryLongSecretKeyAtLeast32BytesLong!
jwt.expiration-ms=3600000

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

#configure DB properties
spring.datasource.url=jdbc:mysql://localhost:3306/sec-51
spring.datasource.username=root
spring.datasource.password=Akeera@567
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

#configure jpa properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hisbernate.dialect = org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/resumes

# Email notifications when admin approves or rejects a user
# Gmail recommended: use an App Password (NOT your normal Gmail password)
app.mail.enabled=true
app.mail.application-name=Virtual Career Fair

# If app.mail.from is unset, spring.mail.username is used as From when set.
# Use env vars so secrets are not committed.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional: if you want a different From
# app.mail.from=${MAIL_FROM:}

# Bootstrap helper (one-time): promote a user to ADMIN on startup
# Example (PowerShell):     
#   $env:BOOTSTRAP_PROMOTE_ADMIN_EMAIL="rajakeera@gmail.com"
#   $env:BOOTSTRAP_SET_PASSWORD="NewPasswordHere"
#   mvn spring-boot:run
app.bootstrap.promote-admin-email=${BOOTSTRAP_PROMOTE_ADMIN_EMAIL:}
app.bootstrap.set-password=${BOOTSTRAP_SET_PASSWORD:}

# OAuth2 social login (Google / GitHub)
# After configuring, frontend buttons will work:
# - http://localhost:2026/auth/google
# - http://localhost:2026/auth/github
#
# Redirect after successful login (frontend will store the JWT and redirect)
app.oauth2.redirect-uri=http://localhost:5173/oauth2/callback
